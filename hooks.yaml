## 실행 예시

### 자동 포매팅
```bash
# 파일 저장 시
$ echo "const x=1" > src/app.ts

# 자동 실행:
# → npx prettier --write src/app.ts
# → npx eslint --fix src/app.ts

# 결과:
$ cat src/app.ts
const x = 1;  # 자동으로 포매팅됨
```

### 디버깅 코드 방지
```bash
# 커밋 시도
$ git add .
$ git commit -m "Add feature"

# 자동 검사:
# → grep -r "console.log\|debugger" src/

# 발견되면:
# ❌ ERROR: 디버깅 코드를 제거한 후 커밋하세요
# git commit 실패 (수정 후 재시도)
```

---

## 성능 고려사항

### 무거운 Hook (비활성화 권장)
```yaml
- name: auto-compile-ts
  disabled: true  # npm run build가 더 빠름
```

### 가벼운 Hook (항상 활성화)
```yaml
- name: auto-format
  disabled: false  # 빠른 도구 (prettier, eslint)
```

### 최적화 팁
1. 정규식 최대한 구체적으로 (성능 향상)
2. 큰 파일은 grep 전에 size 확인
3. 빠른 피드백 필요하면 fork 사용 (가능하면)

---

## 주의사항

1. **Exit Code**
   - `exit 0`: 성공 (계속 진행)
   - `exit 1`: 실패 (작업 중단)

2. **변수**
   - `$FILE`: 현재 파일 경로
   - `$COMMAND`: 실행한 명령어
   - 기본 bash 변수 모두 사용 가능

3. **무한 루프 방지**
   - Hook이 파일을 수정하면 다시 Hook 트리거될 수 있음
   - 필요하면 `disabled` flag로 제한

4. **Context 지정**
   ```yaml
   context: implementer  # Implementer에서만 실행
   context: tester       # Tester에서만 실행
   # 생략하면 모든 agent에서 실행
   ```
