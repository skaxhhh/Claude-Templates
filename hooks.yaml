## 프로젝트별 Hook 커스터마이징 가이드

### 기본 구조 (모든 프로젝트)
```yaml
hooks:
  # 포매팅 자동화
  - name: auto-format-typescript
    on: file-write
    match: "src/.*\\.ts$"
    action: npx prettier --write "$FILE"
  
  # 디버깅 코드 방지
  - name: block-debug-code
    on: bash-command
    match: "^git commit"
    action: grep -r "console.log" src/ && exit 1 || exit 0
```

### 추가 옵션 (프로젝트에 따라)

#### 1️⃣ 마이크로서비스 프로젝트
```yaml
  # 서비스 간 경계 유지
  - name: validate-service-boundaries
    on: file-write
    match: "services/auth/.*\\.ts$"
    action: |
      # auth 서비스에서 api 서비스로 import하는 것 방지
      if grep -q "from.*services/api" "$FILE"; then
        echo "❌ Auth service cannot import from API service"
        exit 1
      fi
```

#### 2️⃣ 데이터베이스 프로젝트
```yaml
  # 마이그레이션 버전 자동 증가
  - name: validate-migration-version
    on: file-write
    match: "migrations/.*\\.sql$"
    action: |
      # 마이그레이션 파일 버전 확인
      LATEST=$(ls migrations/ | sort | tail -1 | cut -d_ -f1)
      NEW_FILE=$(basename "$FILE" | cut -d_ -f1)
      
      if [ "$NEW_FILE" -le "$LATEST" ]; then
        echo "❌ Migration version must be higher than $LATEST"
        exit 1
      fi
```

#### 3️⃣ React/Vue 프로젝트
```yaml
  # 컴포넌트 파일명 규칙
  - name: validate-component-naming
    on: file-write
    match: "src/components/.*\\.tsx?$"
    action: |
      FILENAME=$(basename "$FILE" | cut -d. -f1)
      
      if ! [[ $FILENAME =~ ^[A-Z] ]]; then
        echo "❌ Component filename must start with uppercase"
        exit 1
      fi
```

